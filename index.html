<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SACCO Management System</title>
    
    <!-- PWA Core Elements -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="theme-color" content="#0f172a" />

    <!-- iOS Apple Touch Capables & Custom Shell Meta Rules -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ApexSacco" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Microsoft OS Tiles & Theme Config -->
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="/icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body class="bg-slate-900 text-slate-100 antialiased overflow-x-hidden selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Auto Service Worker Register Anchor -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('[Apex Sacco] PWA Service Worker linked successfully:', registration.scope);
            })
            .catch((error) => {
              console.warn('[Apex Sacco] PWA Service Worker failure during register:', error);
            });
        });
      }
    </script>
  </body>
</html>
